<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio,Vedio,Background Video</title>

    <style>
        body{
            margin:0;
            height:100vh;
            overflow:hidden;
            position:relative;
        }

        #bg-video{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:-1;
        }

        .content{
            position:relative;
            z-index:1;
            background:rgba(0,0,0,0.5);
            padding:20px;
        }

        audio,video{
            display:block;
            margin:20px auto;
            align-items:center;
        }

        h1{
            color:rgb(255,0,136);
        }
    </style>
</head>
<body>
<video id="bg-video" autoplay muted loop>
        <source src="myvideo.mp4" type="video/mp4">
    </video>

    <div class="content">

        <h1 align="center">Video</h1>

        <video width="300" height="200" controls>
            <source src="myvideo.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <h1 align="center">Audio</h1>

        <audio controls>
            <source src="Ennai Vittu Kodukathavar.mp3" type="audio/mp3">
            Your browser does not support the audio tag.
        </audio>

        <h1 align="center">YouTube Video</h1>
<center>
<iframe width="360" height="215"
src="https://www.youtube.com/embed/IcEOI5gRyOc"
title="YouTube video player"
frameborder="0"
allowfullscreen>
</iframe>
</center>
    </div>
</body>
</html>
